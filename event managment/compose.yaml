services:
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
      network: host
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-event_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS:-7}
    ports:
      - "${AUTH_PORT:-8081}:8081"
    restart: unless-stopped

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
      network: host
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-event_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SECRET_KEY}
      REGISTRATION_SERVICE_URL: ${REGISTRATION_SERVICE_URL:-http://registration-service:8083}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8084}
    ports:
      - "${EVENT_PORT:-8082}:8082"
    restart: unless-stopped

  registration-service:
    build:
      context: .
      dockerfile: registration-service/Dockerfile
      network: host
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-event_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SECRET_KEY}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL:-http://event-service:8082}
    ports:
      - "${REGISTRATION_PORT:-8083}:8083"
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
      network: host
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-event_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SECRET_KEY}
    ports:
      - "${NOTIFICATION_PORT:-8084}:8084"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-event_management}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-event_management}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
