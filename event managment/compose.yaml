name: event-management

x-service-defaults: &service-defaults
  restart: unless-stopped

x-java-service: &java-service
  <<: *service-defaults
  networks:
    - backend

x-eureka-client-env: &eureka-client-env
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

x-spring-service-env: &spring-service-env
  <<: *eureka-client-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-event_management}
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  JWT_SECRET: ${JWT_SECRET:-SuperSecretSuperSecretSuperSecret123456}

x-app-depends-on: &app-depends-on
  postgres:
    condition: service_healthy
  eureka-server:
    condition: service_started

x-gateway-depends-on: &gateway-depends-on
  eureka-server:
    condition: service_started
  auth-service:
    condition: service_started
  event-service:
    condition: service_started
  registration-service:
    condition: service_started
  notification-service:
    condition: service_started

services:
  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    networks:
      - backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-event_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-event_management}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  eureka-server:
    <<: *java-service
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTERWITHEUREKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"

  auth-service:
    <<: *java-service
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    depends_on: *app-depends-on
    environment:
      <<: *spring-service-env
      SERVER_PORT: 8081
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS:-7}

  event-service:
    <<: *java-service
    build:
      context: .
      dockerfile: event-service/Dockerfile
    depends_on: *app-depends-on
    environment:
      <<: *spring-service-env
      SERVER_PORT: 8082
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SuperDuperServiceTokenKey}
      REGISTRATION_SERVICE_URL: http://registration-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084

  registration-service:
    <<: *java-service
    build:
      context: .
      dockerfile: registration-service/Dockerfile
    depends_on: *app-depends-on
    environment:
      <<: *spring-service-env
      SERVER_PORT: 8083
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SuperDuperServiceTokenKey}
      EVENT_SERVICE_URL: http://event-service:8082

  notification-service:
    <<: *java-service
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    depends_on: *app-depends-on
    environment:
      <<: *spring-service-env
      SERVER_PORT: 8084
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SuperDuperServiceTokenKey}

  gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on: *gateway-depends-on
    environment:
      <<: *eureka-client-env
      SERVER_PORT: 8080
    networks:
      - backend
      - edge

  frontend:
    <<: *service-defaults
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        API_HOST: ${API_HOST:-localhost}
        API_PORT: ${API_PORT:-8080}
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - edge

volumes:
  postgres_data:

networks:
  backend:
    internal: true
  edge:
