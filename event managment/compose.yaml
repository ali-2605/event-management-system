services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: event-management-db
    environment:
      POSTGRES_DB: event_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-network

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRATION_DAYS: 7
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - event-network
    restart: unless-stopped

  # Event Service
  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: event-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-service-secret-key}
      REGISTRATION_SERVICE_URL: http://registration-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - event-network
    restart: unless-stopped

  # Registration Service
  registration-service:
    build:
      context: .
      dockerfile: registration-service/Dockerfile
    container_name: registration-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-service-secret-key}
      EVENT_SERVICE_URL: http://event-service:8082
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - event-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-service-secret-key}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - event-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  event-network:
    driver: bridge
