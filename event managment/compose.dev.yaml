services:
  auth-service:
    build: null
    image: gradle:9.4.1-jdk21
    working_dir: /workspace
    command: ./gradlew :auth-service:bootRun --no-daemon
    volumes:
      - .:/workspace
      - gradle_cache_auth:/home/gradle/.gradle
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-event_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS:-7}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"

  event-service:
    build: null
    image: gradle:9.4.1-jdk21
    working_dir: /workspace
    command: ./gradlew :event-service:bootRun --no-daemon
    volumes:
      - .:/workspace
      - gradle_cache_event:/home/gradle/.gradle
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-event_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SECRET_KEY}
      REGISTRATION_SERVICE_URL: ${REGISTRATION_SERVICE_URL:-http://registration-service:8083}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8084}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"

  registration-service:
    build: null
    image: gradle:9.4.1-jdk21
    working_dir: /workspace
    command: ./gradlew :registration-service:bootRun --no-daemon
    volumes:
      - .:/workspace
      - gradle_cache_registration:/home/gradle/.gradle
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-event_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SECRET_KEY}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL:-http://event-service:8082}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"

  notification-service:
    build: null
    image: gradle:9.4.1-jdk21
    working_dir: /workspace
    command: ./gradlew :notification-service:bootRun --no-daemon
    volumes:
      - .:/workspace
      - gradle_cache_notification:/home/gradle/.gradle
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-event_management}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-SECRET_KEY}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"

volumes:
  gradle_cache_auth:
  gradle_cache_event:
  gradle_cache_registration:
  gradle_cache_notification:
