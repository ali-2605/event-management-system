spring.application.name=event-service
server.port=${SERVER_PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/event_management}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

security.jwt.secret=${JWT_SECRET:change-me}
security.service-token=${SERVICE_TOKEN:SECRET_KEY}

services.registration.base-url=${REGISTRATION_SERVICE_URL:http://localhost:8083}
services.notification.base-url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

server.error.include-message=always
server.error.include-binding-errors=always
